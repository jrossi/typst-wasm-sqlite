[tools]
typst = "latest"
zig = "latest"

[tasks.build]
description = "Build WASM plugin (release)"
run = "zig build -Doptimize=ReleaseSmall"

[tasks.build-debug]
description = "Build WASM plugin (debug)"
run = "zig build"

[tasks.test-unit]
description = "Run Zig unit tests"
run = "zig build test"

[tasks.gen-testdb]
description = "Generate test database"
run = "zig build gen-testdb"

[tasks.test-integration]
description = "Build and run Typst integration tests"
run = ["zig build gen-testdb", "zig build -Doptimize=ReleaseSmall", "typst compile test.typ test.pdf"]

[tasks.test]
description = "Run all tests"
run = ["zig build test", "zig build gen-testdb", "zig build -Doptimize=ReleaseSmall", "typst compile test.typ test.pdf"]

[tasks.gen-demodb]
description = "Generate demo database"
run = "zig build gen-demodb"

[tasks.demo]
description = "Build and compile demo report"
run = ["zig build gen-demodb", "zig build -Doptimize=ReleaseSmall", "typst compile demo.typ demo.pdf"]

[tasks.pre-commit]
description = "Pre-commit hook: run unit tests"
run = "zig build test"

[tasks.pre-push]
description = "Pre-push hook: run all tests"
run = ["zig build test", "zig build gen-testdb", "zig build -Doptimize=ReleaseSmall", "typst compile test.typ test.pdf"]

[tasks.download-sqlite]
description = "Download SQLite amalgamation"
run = """
curl -L https://www.sqlite.org/2024/sqlite-amalgamation-3470200.zip -o /tmp/sqlite.zip
unzip -o /tmp/sqlite.zip -d /tmp/sqlite
cp /tmp/sqlite/sqlite-amalgamation-3470200/sqlite3.c .
cp /tmp/sqlite/sqlite-amalgamation-3470200/sqlite3.h .
cp /tmp/sqlite/sqlite-amalgamation-3470200/sqlite3ext.h .
rm -r /tmp/sqlite.zip /tmp/sqlite
"""
